[project]
name = "blindfold"
version = "0.1.0"
description = "Blindfold — reversible LLM-anonymization proxy (blindfold/restore)."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "httpx>=0.27",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "anyio>=4",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra"
