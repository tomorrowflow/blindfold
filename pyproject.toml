[project]
name = "blindfold"
version = "0.1.0"
description = "Blindfold — reversible LLM-anonymization proxy (blindfold/restore)."
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.31.0",
    "fastapi>=0.115",
    "httpx>=0.27",
    "unidecode>=1.4.0",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "anyio>=4",
    "testcontainers>=4.14.2",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra"
