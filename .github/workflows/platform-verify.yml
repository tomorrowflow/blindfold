# platform-verify — the repo's first GitHub Actions workflow (ADR-0042).
#
# Sandcastle (.sandcastle/main.mts) is the merge authority for every other gate in the
# AFK loop, but the OS-irreducible half of a native-shell change — does it actually
# build and launch on real macOS / real Windows — can't be answered by the Linux
# sandbox. This workflow answers it, and main.mts's platformVerifyNeeded gate pushes a
# macos/- or windows/-touching branch here and awaits the run's conclusion before
# merging (fail-closed: failure/timeout/missing-run withholds the merge).
#
# Both jobs run on GitHub-hosted standard runners — free/unlimited on this public repo
# (ADR-0042 revises ADR-0040's self-hosted-macOS plan now that the repo is public).
# No secrets: signing (Authenticode/notarization) is deferred to a v2 issue, which is
# exactly what lets this run hosted with nothing to leak.
#
# BlindfoldCore (Swift) and Blindfold.Core (C#) are cross-platform and already tested
# in-sandbox on Linux (#190/#193/#194) — this workflow does NOT re-run swift test/dotnet
# test. It proves the OS-irreducible half: the macOS job still builds + smoke-launches a
# trivial STUB app (#129 AppKit menu bar app is not yet built); the Windows job builds +
# smoke-launches the real WinForms tray supervisor (issue #196, ADR-0041) and freezes the
# real `blindfold-proxy.exe` (issue #195, ADR-0039/0041) it spawns as a child.
# The workflow is fully declarative (plain shell steps, no LLM agent on the runner) —
# see .sandcastle/mac-verify-prompt.md / win-verify-prompt.md for why, and for the
# written build+smoke-launch contract each job below satisfies.

name: platform-verify

"on":
  push:
    paths:
      - "macos/**"
      - "windows/**"
  workflow_dispatch: {}

jobs:
  platform-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # macOS: compile a trivial unsigned stub, wrap it in a minimal .app bundle (the
      # shape the real AppKit menu-bar app will fill in — #129), and smoke-launch it by
      # running the bundle's executable directly and checking it exits 0. No Xcode
      # project exists yet (that's #129's scope), so this proves the toolchain +
      # bundle-launch mechanics ahead of the real shell landing on it.
      - name: Build stub macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP=stub-app/BlindfoldStub.app
          mkdir -p "$APP/Contents/MacOS"
          cat > /tmp/BlindfoldStub.swift <<'SWIFT'
          print("Blindfold stub app (macOS): smoke-launch OK")
          SWIFT
          swiftc /tmp/BlindfoldStub.swift -o "$APP/Contents/MacOS/BlindfoldStub"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>BlindfoldStub</string>
            <key>CFBundleIdentifier</key>
            <string>dev.tomorrowflow.blindfold.stub</string>
            <key>CFBundleName</key>
            <string>BlindfoldStub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.0.0-stub</string>
          </dict>
          </plist>
          PLIST

      - name: Smoke-launch stub macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: ./stub-app/BlindfoldStub.app/Contents/MacOS/BlindfoldStub

      # Windows: build the real WinForms tray supervisor (issue #196, ADR-0041) --
      # unsigned, self-contained single-file per the ADR's first-cut distribution -- and
      # smoke-launch it headlessly via --smoke-test: constructs the NotifyIcon/supervisor/
      # status-client wiring and returns without an Application.Run message loop or any
      # interactive dialog, so it can't block the runner (win-verify-prompt.md's
      # headless-safe contract).
      - name: Build Blindfold.Tray (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet publish windows/Blindfold.Tray/Blindfold.Tray.csproj -c Release -o tray-app/publish

      - name: Smoke-launch Blindfold.Tray (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "tray-app/publish/blindfold.exe" --smoke-test
          $exitCode = $LASTEXITCODE
          $crashLog = "tray-app/publish/smoke-test-crash.log"
          if (Test-Path $crashLog) {
            Write-Host "---- smoke-test-crash.log ----"
            Get-Content $crashLog
            Write-Host "-------------------------------"
          }
          if ($exitCode -ne 0) { throw "blindfold.exe --smoke-test exited $exitCode" }

      # Windows: freeze `blindfold serve` into blindfold-proxy.exe via the shared,
      # cross-platform PyInstaller spec (packaging/blindfold-proxy.spec, ADR-0039),
      # driven through windows/packaging/freeze.ps1 (issue #195) -- the child
      # Blindfold.Tray spawns, additive to the build above, a different build target
      # this step doesn't touch.
      - name: Set up Python (Windows freeze)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (Windows freeze)
        if: runner.os == 'Windows'
        uses: astral-sh/setup-uv@v5

      - name: Freeze blindfold-proxy.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./windows/packaging/freeze.ps1

      - name: Smoke-launch blindfold-proxy.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $proc = Start-Process -FilePath "dist\blindfold-proxy.exe" -ArgumentList "serve" `
            -PassThru -RedirectStandardOutput "proxy-stdout.log" -RedirectStandardError "proxy-stderr.log"
          try {
            $deadline = (Get-Date).AddSeconds(20)
            $up = $false
            while ((Get-Date) -lt $deadline) {
              try {
                $conn = New-Object System.Net.Sockets.TcpClient
                $conn.Connect("127.0.0.1", 25463)
                $conn.Close()
                $up = $true
                break
              } catch {
                Start-Sleep -Milliseconds 200
              }
            }
            if (-not $up) { throw "blindfold-proxy.exe never bound 127.0.0.1:25463" }

            $ui = Invoke-WebRequest -Uri "http://127.0.0.1:25463/ui/" -UseBasicParsing
            if ($ui.StatusCode -ne 200) { throw "GET /ui/ returned $($ui.StatusCode)" }

            $status = Invoke-WebRequest -Uri "http://127.0.0.1:25463/v1/status" -UseBasicParsing
            if ($status.StatusCode -ne 200) { throw "GET /v1/status returned $($status.StatusCode)" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
