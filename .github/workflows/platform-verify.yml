# platform-verify — the repo's first GitHub Actions workflow (ADR-0042).
#
# Sandcastle (.sandcastle/main.mts) is the merge authority for every other gate in the
# AFK loop, but the OS-irreducible half of a native-shell change — does it actually
# build and launch on real macOS / real Windows — can't be answered by the Linux
# sandbox. This workflow answers it, and main.mts's platformVerifyNeeded gate pushes a
# macos/- or windows/-touching branch here and awaits the run's conclusion before
# merging (fail-closed: failure/timeout/missing-run withholds the merge).
#
# Both jobs run on GitHub-hosted standard runners — free/unlimited on this public repo
# (ADR-0042 revises ADR-0040's self-hosted-macOS plan now that the repo is public).
# No secrets: signing (Authenticode/notarization) is deferred to a v2 issue, which is
# exactly what lets this run hosted with nothing to leak.
#
# BlindfoldCore (Swift) and Blindfold.Core (C#) are cross-platform and already tested
# in-sandbox on Linux (#190/#193/#194) — this workflow does NOT re-run swift test/dotnet
# test. It proves the OS-irreducible half: the macOS job still builds + smoke-launches a
# trivial STUB app (#129 AppKit menu bar app is not yet built); the Windows job builds +
# smoke-launches the real WinForms tray supervisor (issue #196, ADR-0041) and freezes the
# real `blindfold-proxy.exe` (issue #195, ADR-0039/0041) it spawns as a child.
# The workflow is fully declarative (plain shell steps, no LLM agent on the runner) —
# see .sandcastle/mac-verify-prompt.md / win-verify-prompt.md for why, and for the
# written build+smoke-launch contract each job below satisfies.

name: platform-verify

"on":
  push:
    paths:
      - "macos/**"
      - "windows/**"
      - ".github/workflows/platform-verify.yml"
  workflow_dispatch: {}

jobs:
  platform-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # macOS: compile a trivial unsigned stub, wrap it in a minimal .app bundle (the
      # shape the real AppKit menu-bar app will fill in — #129), and smoke-launch it by
      # running the bundle's executable directly and checking it exits 0. No Xcode
      # project exists yet (that's #129's scope), so this proves the toolchain +
      # bundle-launch mechanics ahead of the real shell landing on it.
      - name: Build stub macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP=stub-app/BlindfoldStub.app
          mkdir -p "$APP/Contents/MacOS"
          cat > /tmp/BlindfoldStub.swift <<'SWIFT'
          print("Blindfold stub app (macOS): smoke-launch OK")
          SWIFT
          swiftc /tmp/BlindfoldStub.swift -o "$APP/Contents/MacOS/BlindfoldStub"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>BlindfoldStub</string>
            <key>CFBundleIdentifier</key>
            <string>dev.tomorrowflow.blindfold.stub</string>
            <key>CFBundleName</key>
            <string>BlindfoldStub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.0.0-stub</string>
          </dict>
          </plist>
          PLIST

      - name: Smoke-launch stub macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: ./stub-app/BlindfoldStub.app/Contents/MacOS/BlindfoldStub

      # Windows: build the real WinForms tray supervisor (issue #196, ADR-0041) --
      # unsigned, self-contained single-file per the ADR's first-cut distribution -- and
      # smoke-launch it headlessly via --smoke-test: constructs the NotifyIcon/supervisor/
      # status-client wiring and returns without an Application.Run message loop or any
      # interactive dialog, so it can't block the runner (win-verify-prompt.md's
      # headless-safe contract).
      - name: Build Blindfold.Tray (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet publish windows/Blindfold.Tray/Blindfold.Tray.csproj -c Release -o tray-app/publish

      - name: Smoke-launch Blindfold.Tray (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # blindfold.exe is a WinExe-subsystem (GUI) binary: launched via the plain call
          # operator, a GUI-subsystem child does not reliably inherit the caller's console
          # output handles, so its Console.Error text can vanish even when the process runs
          # (and exits) exactly as coded -- a prior run confirmed exit code 1 (our own
          # explicit failure path) with zero captured stdout/stderr. Start-Process with
          # explicit -RedirectStandardOutput/-Error forces real pipe handles the child's
          # Console.Out/Error can always write to, regardless of subsystem.
          $stdout = "tray-app/publish/smoke-test-stdout.log"
          $stderr = "tray-app/publish/smoke-test-stderr.log"
          $proc = Start-Process -FilePath "tray-app/publish/blindfold.exe" -ArgumentList "--smoke-test" `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          $exitCode = $proc.ExitCode

          foreach ($log in @($stdout, $stderr, "tray-app/publish/smoke-test-crash.log")) {
            if ((Test-Path $log) -and (Get-Item $log).Length -gt 0) {
              Write-Host "---- $log ----"
              Get-Content $log
              Write-Host "-------------------------------"
            }
          }

          if ($exitCode -ne 0) { throw "blindfold.exe --smoke-test exited $exitCode" }

      # Windows: freeze `blindfold serve` into blindfold-proxy.exe via the shared,
      # cross-platform PyInstaller spec (packaging/blindfold-proxy.spec, ADR-0039),
      # driven through windows/packaging/freeze.ps1 (issue #195) -- the child
      # Blindfold.Tray spawns, additive to the build above, a different build target
      # this step doesn't touch.
      - name: Set up Python (Windows freeze)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (Windows freeze)
        if: runner.os == 'Windows'
        uses: astral-sh/setup-uv@v5

      - name: Freeze blindfold-proxy.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./windows/packaging/freeze.ps1

      - name: Smoke-launch blindfold-proxy.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $proc = Start-Process -FilePath "dist\blindfold-proxy.exe" -ArgumentList "serve" `
            -PassThru -RedirectStandardOutput "proxy-stdout.log" -RedirectStandardError "proxy-stderr.log"
          try {
            $deadline = (Get-Date).AddSeconds(20)
            $up = $false
            while ((Get-Date) -lt $deadline) {
              try {
                $conn = New-Object System.Net.Sockets.TcpClient
                $conn.Connect("127.0.0.1", 25463)
                $conn.Close()
                $up = $true
                break
              } catch {
                Start-Sleep -Milliseconds 200
              }
            }
            if (-not $up) { throw "blindfold-proxy.exe never bound 127.0.0.1:25463" }

            $ui = Invoke-WebRequest -Uri "http://127.0.0.1:25463/ui/" -UseBasicParsing
            if ($ui.StatusCode -ne 200) { throw "GET /ui/ returned $($ui.StatusCode)" }

            $status = Invoke-WebRequest -Uri "http://127.0.0.1:25463/v1/status" -UseBasicParsing
            if ($status.StatusCode -ne 200) { throw "GET /v1/status returned $($status.StatusCode)" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      # Windows: assemble issue #197's portable side-by-side folder (ADR-0041's first-cut
      # distribution) -- blindfold.exe and blindfold-proxy.exe in one directory, the tray
      # discovering the proxy by relative path (Program.cs's AppContext.BaseDirectory lookup).
      # Runs after the standalone freeze smoke-launch above has already stopped its own child,
      # so nothing is still holding port 25463.
      - name: Assemble portable folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Copy-Item "dist\blindfold-proxy.exe" "tray-app\publish\blindfold-proxy.exe" -Force

      # Windows: issue #197's portable-folder AC, verified as two complementary assertions
      # (a deliberate contract split -- see Program.cs RunSmokeLaunchFull and ADR-0041's
      # "thin, logic-free front door"):
      #
      #   1. ONE-HOP -- the frozen proxy's own capability. Launch blindfold-proxy.exe directly
      #      with the L3 stub env set at PowerShell scope and assert /v1/status reaches
      #      "protected". This proves the portable folder's proxy reaches Protected when its
      #      L3 dependency is configured.
      #   2. TWO-HOP -- the tray's supervision job. Launch blindfold.exe --smoke-launch-full,
      #      which spawns the proxy, polls it, supervises it, and reduces its /v1/status; it
      #      exits 0 on any non-error terminal (Protected OR Degraded). It does NOT require
      #      Protected: the single-file WinExe host does not reliably propagate ambient env to
      #      its child, so the tray-spawned proxy's l3 probe stays unhealthy (Degraded) even
      #      though the one-hop proxy above reaches Protected. Requiring Protected here would be
      #      testing env-inheritance-through-a-GUI-host, not the tray's contract, and is what
      #      previously deadlocked this gate.
      #
      # /v1/status only reports "protected" once every dependency probe is healthy
      # (status.py's compute_state) -- with no BLINDFOLD_L3_MODEL configured, the l3 probe
      # (ping_ollama) is unhealthy by construction ("no L3 adjudicator configured").
      # windows/packaging/ollama-stub.py stands in for the real Ollama dependency at its
      # network boundary -- answers GET /api/tags with a bare 200, same seam-stub discipline
      # the leak-audit tests use -- so BLINDFOLD_L3_MODEL/BLINDFOLD_L3_BASE_URL can point at it
      # and the one-hop l3 probe reports healthy.
      - name: Smoke-launch portable folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stubPort = 25464
          $stubStdout = "tray-app/publish/ollama-stub-stdout.log"
          $stubStderr = "tray-app/publish/ollama-stub-stderr.log"
          $stub = Start-Process -FilePath "python" `
            -ArgumentList "windows/packaging/ollama-stub.py", "$stubPort" `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput $stubStdout -RedirectStandardError $stubStderr

          try {
            # Same TCP-connect readiness loop the real-proxy smoke-launch step above uses
            # (never a bare sleep-and-hope) -- a 1s sleep here previously raced the stub's own
            # startup, so an unlucky slow start silently left BLINDFOLD_L3_BASE_URL pointed at
            # nothing and the l3 probe unhealthy for the tray's entire poll window, indistinguishable
            # from this fix never having landed.
            $stubDeadline = (Get-Date).AddSeconds(10)
            $stubUp = $false
            while ((Get-Date) -lt $stubDeadline) {
              if ($stub.HasExited) { throw "ollama-stub.py exited early with code $($stub.ExitCode)" }
              try {
                $conn = New-Object System.Net.Sockets.TcpClient
                $conn.Connect("127.0.0.1", $stubPort)
                $conn.Close()
                $stubUp = $true
                break
              } catch {
                Start-Sleep -Milliseconds 200
              }
            }
            if (-not $stubUp) { throw "ollama-stub.py never bound 127.0.0.1:$stubPort" }

            $env:BLINDFOLD_L3_MODEL = "smoke-test-stub"
            $env:BLINDFOLD_L3_BASE_URL = "http://127.0.0.1:$stubPort"

            # ONE-HOP assertion (issue #197): the frozen portable proxy, launched directly with
            # the L3 stub env at PowerShell scope, must reach "protected". This proves the
            # portable folder's blindfold-proxy.exe reaches Protected when every dependency probe
            # is healthy -- independent of the tray. (The two-hop --smoke-launch-full below
            # deliberately does NOT require Protected; see the step's header comment.)
            $oneHopStdout = "tray-app/publish/onehop-proxy-stdout.log"
            $oneHopStderr = "tray-app/publish/onehop-proxy-stderr.log"
            $oneHop = Start-Process -FilePath "tray-app/publish/blindfold-proxy.exe" `
              -ArgumentList "serve", "--host", "127.0.0.1", "--port", "25465" `
              -PassThru -NoNewWindow -RedirectStandardOutput $oneHopStdout -RedirectStandardError $oneHopStderr
            try {
              $oneHopDeadline = (Get-Date).AddSeconds(30)
              $oneHopProtected = $false
              $lastState = "<never answered>"
              while ((Get-Date) -lt $oneHopDeadline) {
                if ($oneHop.HasExited) {
                  throw "one-hop blindfold-proxy.exe exited early with code $($oneHop.ExitCode)"
                }
                try {
                  $resp = Invoke-WebRequest -Uri "http://127.0.0.1:25465/v1/status" -UseBasicParsing
                  $lastState = ($resp.Content | ConvertFrom-Json).state
                  if ($lastState -eq "protected") { $oneHopProtected = $true; break }
                } catch { }
                Start-Sleep -Milliseconds 500
              }
              if (-not $oneHopProtected) {
                foreach ($log in @($oneHopStdout, $oneHopStderr)) {
                  if ((Test-Path $log) -and (Get-Item $log).Length -gt 0) {
                    Write-Host "---- $log ----"; Get-Content $log; Write-Host "----"
                  }
                }
                throw "one-hop frozen proxy never reached Protected (last state: $lastState)"
              }
            } finally {
              Stop-Process -Id $oneHop.Id -Force -ErrorAction SilentlyContinue
            }

            $stdout = "tray-app/publish/smoke-launch-full-stdout.log"
            $stderr = "tray-app/publish/smoke-launch-full-stderr.log"
            $proc = Start-Process -FilePath "tray-app/publish/blindfold.exe" -ArgumentList "--smoke-launch-full" `
              -PassThru -NoNewWindow `
              -RedirectStandardOutput $stdout -RedirectStandardError $stderr

            $proc.WaitForExit()
            $exitCode = $proc.ExitCode

            foreach ($log in @($stdout, $stderr, $stubStdout, $stubStderr)) {
              if ((Test-Path $log) -and (Get-Item $log).Length -gt 0) {
                Write-Host "---- $log ----"
                Get-Content $log
                Write-Host "-------------------------------"
              }
            }

            if ($exitCode -ne 0) { throw "blindfold.exe --smoke-launch-full exited $exitCode" }
          } finally {
            Stop-Process -Id $stub.Id -Force -ErrorAction SilentlyContinue
          }
